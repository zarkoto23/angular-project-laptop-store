<div class="register-page">
    <div class="container">
        @if(showErrorModal){
        <app-error-modal [message]="errorModalMessage" [type]="modalType"
            (closed)="closeErrorModal()"></app-error-modal>
        }
        <div class="register-wrapper">

            <div class="register-info">
                <span class="badge">Създаване на профил</span>
                <h1>Присъедини се към LaptopMarket</h1>
                <p>
                    Създай акаунт, за да купуваш и продаваш лаптопи лесно и бързо.
                </p>

            </div>

            <div class="register-card">
                <h2>Регистрация</h2>

                <form>

                    <div class="form-group">
                        <label>Имейл</label>
                        <input [(ngModel)]="email" type="email" name="email" placeholder="example@email.com" />
                    </div>

                    <div class="form-group">
                        <label>Парола</label>
                        <input [(ngModel)]="password" type="password" name="password" placeholder="••••••••" />
                    </div>

                    <div class="form-group">
                        <label>Повтори парола</label>
                        <input [(ngModel)]="rePass" type="password" name="rePass" placeholder="••••••••" />
                    </div>

                    <button (click)="onRegister()" class="btn btn-primary full-width">
                        Създай акаунт
                    </button>
                </form>

                <p class="login-link">
                    Вече имаш акаунт?
                    <a routerLink="/login">Вход</a>
                </p>
            </div>

        </div>
    </div>
</div>
