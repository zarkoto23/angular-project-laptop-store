<div class="register-page">
    <div class="container">
        <div class="register-wrapper">

            <!-- Left side -->
            <div class="register-info">
                <span class="badge">Създаване на профил</span>
                <h1>Присъедини се към LaptopMarket</h1>
                <p>
                    Създай акаунт, за да купуваш и продаваш лаптопи лесно и бързо.
                </p>

            </div>

            <!-- Form -->
            <div class="register-card">
                <h2>Регистрация</h2>

                <form>

                    <div class="form-group">
                        <label>Имейл</label>
                        <input type="email" placeholder="example@email.com" />
                    </div>

                    <div class="form-group">
                        <label>Парола</label>
                        <input type="password" placeholder="••••••••" />
                    </div>

                    <div class="form-group">
                        <label>Повтори парола</label>
                        <input type="password" placeholder="••••••••" />
                    </div>

                    <button class="btn btn-primary full-width">
                        Създай акаунт
                    </button>
                </form>

                <p class="login-link">
                    Вече имаш акаунт?
                    <a routerLink="/login">Вход</a>
                </p>
            </div>

        </div>
    </div>
</div>
